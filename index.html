<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 강아지? 고양이?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 동물상 테스트</h1>
            <p>나의 얼굴은 어떤 동물과 닮았을까?</p>
        </header>
        
        <main>
            <div class="upload-container" id="upload-area">
                <div class="upload-box" id="image-preview-container">
                    <img id="upload-image" src="" alt="업로드 이미지" style="display: none;">
                    <div id="upload-placeholder">
                        <span class="upload-icon">📸</span>
                        <p>사진을 업로드하거나 여기로 끌어다 놓으세요</p>
                    </div>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <button id="upload-btn" class="btn">사진 선택하기</button>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 얼굴을 분석 중입니다...</p>
            </div>

            <div id="result-container" class="result-container" style="display: none;">
                <h2 id="result-title">결과</h2>
                <div class="progress-container">
                    <div class="animal-label">🐶 강아지상</div>
                    <div class="progress">
                        <div id="dog-bar" class="progress-bar dog" style="width: 0%"></div>
                    </div>
                    <span id="dog-percent">0%</span>
                </div>
                <div class="progress-container">
                    <div class="animal-label">🐱 고양이상</div>
                    <div class="progress">
                        <div id="cat-bar" class="progress-bar cat" style="width: 0%"></div>
                    </div>
                    <span id="cat-percent">0%</span>
                </div>
                <p id="result-message" class="result-message"></p>
                <button id="retry-btn" class="btn secondary">다시 시도하기</button>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2024 AI Animal Face. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
