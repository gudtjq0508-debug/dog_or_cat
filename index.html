<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 Pro - 나를 닮은 동물은?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">🐾 AI FACE</div>
            <h1>동물상 테스트 <span class="badge">PRO</span></h1>
            <p>인공지능이 당신의 얼굴 특징을 정밀 분석합니다</p>
        </header>
        
        <main>
            <!-- Decoration Icons -->
            <div class="deco-wrap">
                <span class="float-icon">🐶</span>
                <span class="float-icon">🐱</span>
                <span class="float-icon">🐕</span>
                <span class="float-icon">🐈</span>
                <span class="float-icon">🐾</span>
            </div>

            <section id="upload-section" class="card">
                <div class="upload-area" id="upload-area">
                    <div id="image-preview-container">
                        <img id="upload-image" src="" alt="업로드 이미지" style="display: none;">
                        <div id="upload-placeholder">
                            <div class="icon-circle">📸</div>
                            <h3>사진을 업로드하세요</h3>
                            <p>정면 사진일수록 정확도가 올라갑니다</p>
                        </div>
                    </div>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <button id="upload-btn" class="main-btn">분석 시작하기</button>
            </section>

            <section id="loading-section" class="card" style="display: none;">
                <div class="scanner"></div>
                <div class="loading-text">
                    <h2 id="loading-msg">얼굴 윤곽 스캔 중...</h2>
                    <div class="progress-line"></div>
                </div>
            </section>

            <section id="result-section" class="card" style="display: none;">
                <div class="result-header">
                    <h2 id="main-animal-title">당신은 강아지상!</h2>
                    <p id="sub-animal-desc">따뜻한 눈매를 가진 매력적인 얼굴</p>
                </div>

                <div class="analysis-grid">
                    <div class="animal-score dog">
                        <div class="score-info">
                            <span class="label">강아지</span>
                            <span id="dog-score" class="percent">0%</span>
                        </div>
                        <div class="bar-wrap"><div id="dog-bar" class="fill"></div></div>
                    </div>
                    <div class="animal-score cat">
                        <div class="score-info">
                            <span class="label">고양이</span>
                            <span id="cat-score" class="percent">0%</span>
                        </div>
                        <div class="bar-wrap"><div id="cat-bar" class="fill"></div></div>
                    </div>
                </div>

                <div class="trait-card">
                    <h3>💡 AI 분석 레포트</h3>
                    <ul id="trait-list">
                        <!-- JS에서 동적으로 삽입 -->
                    </ul>
                </div>

                <button id="retry-btn" class="sub-btn">다른 사진으로 테스트</button>
            </section>
        </main>
        
        <footer>
            <p>AI Animal Face Analysis Pro v2.0</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
